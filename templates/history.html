<<!DOCTYPE html>
<html>
<head>
<title>Prediction History</title>
</head>

<body>

<h2>Prediction History</h2>

<table border="1">

<tr>
<th>Date</th>
<th>Image</th>
<th>Prediction</th>
<th>Confidence</th>
</tr>

{% for row in data %}

<tr>

<td>{{ row[0] }}</td>

<td>
<img src="{{ row[1] }}" width="100">
</td>

<td>{{ row[2] }}</td>

<td>{{ row[3] }}%</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">Back</a>

</body>
</html>
