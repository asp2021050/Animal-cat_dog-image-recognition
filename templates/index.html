<!DOCTYPE html>
<html>
<head>
    <title>Cat & Dog Image Classifier</title>

<style>

body{
    font-family: Arial,sans-serif;
    background:#f4f4f4;
    text-align:center;

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:1000px;
    background:rgb(230,222,222);
    padding:50px;
    border-radius:15px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.2);
}

button{
    background:#007bff;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#e8f5e9;
    border-radius:10px;
}

img{
    margin-top:20px;
    border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>🐱🐶 Cat & Dog Image Classifier</h1>

<form action="/predict" method="post" enctype="multipart/form-data">

<input type="file" name="image" required>

<br><br>

<button type="submit">
Predict
</button>

</form>

{% if image %}

<h3>Uploaded Image</h3>

<img src="{{ image }}" width="250">

{% endif %}


{% if prediction %}

<div class="result">

<h2>
Prediction: {{ prediction }}
</h2>

<h3>
Confidence: {{ confidence }}%
</h3>

</div>

{% endif %}


<br><br>

<a href="/history">
<button>
View History
</button>
</a>

</div>

</body>
</html>
