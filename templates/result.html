<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            text-align:center;
            margin-top:50px;
        }

        .container{
            width:500px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.2);
        }

        h1{
            color:#333;
        }

        .result{
            margin-top:20px;
            padding:15px;
            background:#e8f5e9;
            border-radius:10px;
        }

        img{
            margin-top:20px;
            border-radius:10px;
            border:2px solid #ddd;
        }

        a{
            text-decoration:none;
            background:#007bff;
            color:white;
            padding:10px 20px;
            border-radius:8px;
        }

        a:hover{
            background:#0056b3;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🐱🐶 Prediction Result</h1>

    <img src="{{ image }}" width="300">

    <div class="result">

        <h2>
            Prediction: {{ prediction }}
        </h2>

        <h3>
            Confidence: {{ confidence }}%
        </h3>

    </div>

    <br><br>

    <a href="/">Try Again</a>

</div>

</body>
</html>
